equipment:
  - { id: cone_crusher,       label: "Конусные дробилки",              present: true }
  - { id: ball_mill,          label: "Мельницы 6м",                    present: true }
  - { id: mill_liner,         label: "Футеровка мельниц",              present: true }
  - { id: grinding_media,     label: "Мелющие шары (120 мм доступны)", present: true }

id: alloys-v1
name: Aluminum alloys demo pack
description: MVP domain pack for aging, strengthening, ductility and cost tradeoffs.

units:
  strength: MPa
  hardness: HBW
  cost: percent
  ductility_loss: percent
  aging_temperature: C
  aging_time: h

node_types:
  factor:
    tags: [controllable]
  mechanism:
    tags: []
  property:
    tags: []
  kpi:
    tags: [kpi]

# Дополнительные теги, которые sidecar может проставлять сверх node_types:
extra_tags:
  constraint:
    description: "KPI-узел, который является ограничением (hard constraint из KpiContract), а не целью"
    applies_to: [kpi]
  kpi_proxy:
    description: "Property-узел, косвенно отражающий KPI через известный механизм (напр. hardness ≈ strength)"
    applies_to: [property]

edge_types:
  - mechanism
  - tradeoff
  - substitution
  - proxy

operators:
  - mechanism_path
  - substitution
  - gap

scoring_weights:
  kpi_impact: 0.30
  evidence: 0.25
  plausibility: 0.15
  cost: 0.15
  risk: 0.10
  novelty: 0.05

hard_constraints:
  - metric: cost
    op: "<="
    value: 5
    unit: percent
  - metric: ductility_loss
    op: "<="
    value: 3
    unit: percent

skeptic_rules:
  - id: uncovered_constraint
    when: "contract constraint has no direct supporting claim"
    flag: "Need expert review: constraint impact is not evidenced"
  - id: low_evidence_top_candidate
    when: "hypothesis score.evidence < 0.55 and status == recommended"
    flag: "Do not rank as top without stronger evidence"

demo_terms:
  controllable_examples:
    - aging time
    - aging temperature
    - scandium addition
    - zirconium addition
  kpi_examples:
    - strength
    - hardness
    - ductility loss
    - cost

